# Decap CMS configuration for flowhouse
# This file defines what your sister can edit and how.
# Hosting: Netlify  |  Source of truth: GitHub repo eghabra27-cmd/flowhouse-site

backend:
  name: github
  repo: eghabra27-cmd/flowhouse-site
  branch: main
  # Sveltia uses GitHub OAuth via our Cloudflare Worker auth helper
  # (deployed at sveltia-cms-auth.eghabra27.workers.dev)
  base_url: https://sveltia-cms-auth.eghabra27.workers.dev
  auth_endpoint: auth
  commit_messages:
    create: 'content: create {{collection}} "{{slug}}"'
    update: 'content: update {{collection}} "{{slug}}"'
    delete: 'content: delete {{collection}} "{{slug}}"'
    uploadMedia: 'content: upload {{path}}'
    deleteMedia: 'content: delete {{path}}'

# Image uploads land here
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Brand polish for the editor itself
site_url: https://flowhouserb.com
display_url: https://flowhouserb.com
logo_url: /brand/wordmark-tight.png

# When she hits "Publish", Netlify rebuilds and the site is live in ~60s
publish_mode: simple

collections:
  # ─────────────────────────────────────────────
  # HOME PAGE
  # ─────────────────────────────────────────────
  - name: "home"
    label: "Home page"
    description: "The main page at flowhouserb.com — hero, classes, testimonials, founding circle CTA."
    files:
      - name: "home_hero"
        label: "Hero section"
        file: "content/home/hero.yml"
        fields:
          - { label: "Eyebrow (small text above headline)", name: "eyebrow", widget: "string" }
          - { label: "Headline (HTML allowed — wrap one word in <em>…</em> to italicize)", name: "headline_html", widget: "text" }
          - { label: "Subhead paragraph", name: "subhead", widget: "text" }
          - { label: "Badge text (on the hero image)", name: "badge", widget: "string" }
          - { label: "Primary button — label", name: "cta_primary_label", widget: "string" }
          - { label: "Primary button — link", name: "cta_primary_href", widget: "string", hint: "Use #waitlist for the Founding Circle form, or a page like memberships.html" }
          - { label: "Secondary button — label", name: "cta_secondary_label", widget: "string" }
          - { label: "Secondary button — link", name: "cta_secondary_href", widget: "string" }
          - { label: "Hero image", name: "hero_image", widget: "image" }
          - { label: "Hero image alt text (for accessibility & SEO)", name: "hero_image_alt", widget: "text" }
          - { label: "Meta strip — Method label", name: "meta_method", widget: "string" }
          - { label: "Meta strip — Modalities label", name: "meta_modalities", widget: "string" }
          - { label: "Meta strip — Opening label", name: "meta_opening", widget: "string" }

      - name: "home_classes"
        label: "Class menu (3 classes)"
        file: "content/home/classes.yml"
        fields:
          - label: "Classes"
            name: "classes"
            widget: "list"
            max: 3
            min: 3
            fields:
              - { label: "Class name", name: "name", widget: "string" }
              - { label: "Duration / spots", name: "meta", widget: "string", hint: "e.g. '50 min · 10 spots'" }
              - { label: "Bio (the long description)", name: "bio", widget: "text" }
              - { label: "Card image", name: "image", widget: "image", required: false }

      - name: "home_testimonials"
        label: "Testimonials"
        file: "content/home/testimonials.yml"
        fields:
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            fields:
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Subtitle (optional)", name: "subtitle", widget: "string", required: false }

      - name: "home_founding_cta"
        label: "Founding Circle call-to-action"
        file: "content/home/founding.yml"
        fields:
          - { label: "Headline", name: "headline", widget: "text" }
          - { label: "Body paragraph", name: "body", widget: "text" }
          - { label: "Button label", name: "cta", widget: "string" }
          - { label: "Form placeholder text", name: "placeholder", widget: "string", default: "you@email.com" }

  # ─────────────────────────────────────────────
  # STUDIO PAGE
  # ─────────────────────────────────────────────
  - name: "studio"
    label: "Studio page"
    description: "The studio page — address, atmosphere, build photos."
    files:
      - name: "studio_main"
        label: "Studio content"
        file: "content/studio/main.yml"
        fields:
          - { label: "Page eyebrow", name: "eyebrow", widget: "string", default: "The Studio" }
          - { label: "Page headline", name: "headline", widget: "text" }
          - { label: "Intro paragraph", name: "intro", widget: "text" }
          - { label: "Address line 1", name: "address1", widget: "string", default: "18585 Coastal Highway, Suite 22" }
          - { label: "Address line 2", name: "address2", widget: "string", default: "Rehoboth Beach, DE 19971" }
          - { label: "Parking note", name: "parking", widget: "text", default: "Free public lot directly in front of the building." }
          - { label: "Contact email", name: "email", widget: "string", default: "info@flowhouserb.com" }
          - { label: "Pull quote", name: "pullquote", widget: "text" }
          - label: "What's inside (3 cards)"
            name: "inside_cards"
            widget: "list"
            max: 3
            min: 3
            fields:
              - { label: "Card title", name: "title", widget: "string" }
              - { label: "Card body", name: "body", widget: "text" }

  # ─────────────────────────────────────────────
  # WHAT TO EXPECT PAGE
  # ─────────────────────────────────────────────
  - name: "what_to_expect"
    label: "What to Expect page"
    description: "First-timer friendly page — the class flow and FAQ."
    files:
      - name: "wte_main"
        label: "Page content"
        file: "content/what-to-expect/main.yml"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string", default: "What to Expect" }
          - { label: "Headline", name: "headline", widget: "text" }
          - { label: "Intro paragraph", name: "intro", widget: "text" }
          - label: "Six-block class flow"
            name: "blocks"
            widget: "list"
            max: 6
            min: 6
            fields:
              - { label: "Block name (e.g. Center)", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - { label: "Community section headline", name: "community_headline", widget: "text" }
          - { label: "Community section body", name: "community_body", widget: "text" }
          - label: "FAQ"
            name: "faq"
            widget: "list"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer", name: "answer", widget: "text" }

  # ─────────────────────────────────────────────
  # MEMBERSHIPS PAGE (teaser)
  # ─────────────────────────────────────────────
  - name: "memberships"
    label: "Memberships (teaser)"
    description: "Pre-launch teaser. Pricing stays hidden in HTML comments until launch."
    files:
      - name: "memberships_main"
        label: "Page content"
        file: "content/memberships/main.yml"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string", default: "Founding Memberships" }
          - { label: "Headline", name: "headline", widget: "text" }
          - { label: "Body paragraph", name: "body", widget: "text" }
          - { label: "Status note", name: "status", widget: "string", default: "Launching soon" }
          - { label: "Form label", name: "form_label", widget: "string" }
          - { label: "Button label", name: "cta", widget: "string", default: "Join the Founding Circle" }

  # ─────────────────────────────────────────────
  # SCHEDULE PAGE (teaser)
  # ─────────────────────────────────────────────
  - name: "schedule"
    label: "Schedule (teaser)"
    description: "Pre-launch teaser."
    files:
      - name: "schedule_main"
        label: "Page content"
        file: "content/schedule/main.yml"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string", default: "The Schedule" }
          - { label: "Headline", name: "headline", widget: "text" }
          - { label: "Body", name: "body", widget: "text" }
          - { label: "Status note", name: "status", widget: "string", default: "Class schedule launching soon" }

  # ─────────────────────────────────────────────
  # MERCH PAGE
  # ─────────────────────────────────────────────
  - name: "merch"
    label: "Merch page"
    description: "The 8 merch products. Each product has a name, description, and Squarespace checkout URL."
    files:
      - name: "merch_intro"
        label: "Merch page intro"
        file: "content/merch/intro.yml"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string", default: "The Line" }
          - { label: "Headline", name: "headline", widget: "text" }
          - { label: "Body paragraph", name: "body", widget: "text" }
          - { label: "Status banner", name: "status", widget: "string", default: "Limited first release coming soon" }

      - name: "merch_products"
        label: "Products"
        file: "content/merch/products.yml"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            summary: "{{fields.name}} — {{fields.meta}}"
            min: 1
            max: 24
            fields:
              - { label: "Product name", name: "name", widget: "string", hint: "Shown as the card title. E.g. 'The Studio Wrap · Taupe'" }
              - { label: "Meta line (subtitle under name)", name: "meta", widget: "string", required: false, hint: "e.g. 'Ribbed long-sleeve' or 'Seamless set'" }
              - { label: "Product image", name: "image", widget: "image" }
              - { label: "Image alt text (accessibility)", name: "alt", widget: "string", required: false }
              - { label: "Price (only shown when checkout URL is set)", name: "price", widget: "string", required: false, hint: "e.g. '$58' — leave blank to hide" }
              - { label: "Squarespace checkout URL", name: "checkout_url", widget: "string", required: false, hint: "Paste the Squarespace product URL here once the store is live. Leave blank to show 'Coming Soon'." }
              - { label: "Hide this product?", name: "hidden", widget: "boolean", default: false, required: false }

  # ─────────────────────────────────────────────
  # TEACH PAGE
  # ─────────────────────────────────────────────
  - name: "teach"
    label: "Teach page"
    description: "Instructor recruitment page."
    files:
      - name: "teach_main"
        label: "Page content"
        file: "content/teach/main.yml"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string", default: "Teach at flowhouse" }
          - { label: "Headline", name: "headline", widget: "text" }
          - { label: "Intro paragraph", name: "intro", widget: "text" }
          - label: "Benefit cards"
            name: "benefits"
            widget: "list"
            fields:
              - { label: "Benefit title", name: "title", widget: "string" }
              - { label: "Benefit body", name: "body", widget: "text" }
          - { label: "Application section headline", name: "apply_headline", widget: "text" }
          - { label: "Application section body", name: "apply_body", widget: "text" }

  # ─────────────────────────────────────────────
  # GLOBAL — nav, footer, brand
  # ─────────────────────────────────────────────
  - name: "global"
    label: "Site-wide"
    description: "Things that appear on every page — nav, footer, contact info."
    files:
      - name: "global_settings"
        label: "Global settings"
        file: "content/global/settings.yml"
        fields:
          - { label: "Studio email (footer)", name: "email", widget: "string", default: "info@flowhouserb.com" }
          - { label: "Studio address (footer)", name: "address", widget: "string", default: "18585 Coastal Highway, Suite 22 · Rehoboth Beach, DE 19971" }
          - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
          - { label: "Footer tagline", name: "footer_tagline", widget: "string", default: "A new movement space coming to Rehoboth · Summer 2026" }
          - { label: "Sticky bar — left text", name: "sticky_left", widget: "string", default: "Opening Summer 2026 · Founding Memberships Launching Soon" }
          - { label: "Sticky bar — button label", name: "sticky_cta", widget: "string", default: "Join the Founding Circle" }
