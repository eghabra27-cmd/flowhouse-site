eyebrow: "Teach at flowhouse"
headline: "Now hiring and training our founding instructors."
intro: "We're building a founding team of pilates and barre instructors who care deeply about the practice, the community, and the studio. Certification preferred, not required — we mentor and train in-house for the right movement-focused people."
benefits:
  - title: "Mentorship and in-house training"
    body: "Our founding team trains together, learns together, and shapes the studio culture from day one."
  - title: "Thoughtful compensation"
    body: "Built to value your time and your craft. We're committed to compensation that reflects the work and the community you build."
  - title: "A studio with intention"
    body: "Modern equipment, warm space, a community that takes the practice seriously and doesn't take itself too seriously."
apply_headline: "Apply to teach."
apply_body: "Tell us a little about you, your background, and what you're looking for in a studio. We read every application."
