philosophy_eyebrow: our hiring philosophy
philosophy_headline: Certification preferred. Movement obsession required.
philosophy_intro: We believe the best instructors are made — in the room, with mentorship, on real reformers, in front of real classes. We're open to movement-focused individuals at any starting point.
love_to_see_eyebrow: we love to see
love_to_see_headline: A few things, in any combination.
love_to_see_items:
  - A pilates, barre, dance, yoga, or rehab background
  - A current certification (BASI, Polestar, STOTT, Romana's, Body Arts & Science, or equivalent)
  - Group-class teaching experience — any modality
  - Comfort with hands-on adjustments and clear verbal cueing
  - A point of view about programming you can defend in conversation
  - 'Above all: a calm, deep love for the practice'
train_eyebrow: we'll train you in
train_headline: The Flowhouse Method.
train_items:
  - In-house training on the Flowformer method and machine
  - One-on-one mentorship through your first 90 days
  - Programming workshops every quarter
  - A real audition — not a résumé interview
  - A founding-team seat in shaping the practice
benefits_eyebrow: what we offer
benefits_headline: A teaching environment built by people who teach.
benefits_intro: Most studios optimise for the operator. We optimise for the instructor — because if the room behind the microphone is calm, the room in front of it is too.
benefits:
  - title: Complimentary membership
    body: Unlimited reformer + barre classes on our schedule for the duration of your time on the team. Movement keeps you sharp.
  - title: Discounted merchandise
    body: Generous discount on the flowhouse apparel line. Wear it to teach, live in it after.
  - title: Thoughtful compensation
    body: Competitive compensation, mentorship, and long-term growth opportunities within an expanding studio environment.
  - title: In-house training & mentorship
    body: A real apprenticeship in the Flowhouse Method, one-on-one mentorship through your first 90 days, programming workshops every quarter.
  - title: Growth with the studio
    body: Founding-team members shape what flowhouse becomes — the programming, the apprenticeship pipeline, the future locations. There's room to grow with us.
  - title: A community-focused environment
    body: Small, warm, calm. We hire for warmth and craft, in that order. We protect the room — for our members and our team.
apply_eyebrow: application
apply_headline: Tell us about you.
apply_lead: Five minutes. We respond to every application within a week.
