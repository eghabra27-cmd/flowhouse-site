inside_eyebrow: what's inside
inside_headline: Designed for the body — and for the room you walk into.
inside_intro: Our custom reformers, the studio, and every material were considered intentionally. The room you train in shapes how you feel about training.
inside_cards:
  - tag: Custom equipment
    image: /images/v4/flowformer-real.jpg
    alt: The custom FlowFormer reformer used at flowhouse
    title: Custom FlowFormer reformers
    body: Ten custom reformers, suited to the way we teach. Matte-black frames with the flowhouse wordmark on the side rail — the foundation of the Flowhouse Method.
  - tag: Two barre walls
    image: /images/uploads/f87de14c-7b29-4678-a62d-329a47e2b2e6.png
    alt: One of the two barre walls installed at flowhouse — wooden barre on black hardware against a glass partition
    title: Two barre walls
    body: Solid wood barres on minimal black hardware — one wall for our Barre 45 classes (twenty-five spots), one for warmups and stretch.
  - tag: Warm, intentional
    image: /images/uploads/53754f3c-88e5-4bd6-8687-aabd014b27eb.png
    alt: Warm walnut wood-slat acoustic wall texture
    title: Warm walnut interiors
    body: Acoustic walnut feature walls, large sphere pendant lighting, and a calm coastal palette — designed to slow you down the moment you walk in.
atmosphere_eyebrow: our atmosphere
atmosphere_html: "A room built for <em style='color: var(--c-pink);'>ritual</em>, not routine."
