eyebrow: the studio · a movement sanctuary
headline: One room. Built as a sanctuary.
intro: flowhouse is a single, carefully designed studio on the Delaware coast. Every material was chosen — every angle was intentional — so the room feels less like a fitness studio and more like the hour you give yourself every day.
card_eyebrow: opening summer 2026
card_headline: flowhouse · Rehoboth Beach
card_body: A movement sanctuary on Coastal Highway. Ten custom Flowformer reformers, two barre walls, warm walnut feature walls, and a calming environment designed for ritual.
address1: 18585 Coastal Highway, Suite 22
address2: Rehoboth Beach, DE 19971
opening_label: Summer 2026
parking: Public parking available + plenty of nearby parking.
email: info@flowhouserb.com
