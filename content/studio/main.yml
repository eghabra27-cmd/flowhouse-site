eyebrow: the studio · a movement sanctuary
headline: One room. Built as a sanctuary.
intro: flowhouse is a single, carefully designed studio on the Delaware coast. Every material was chosen — every angle was intentional — so the room feels less like a fitness studio and more like the hour you give yourself every day.
