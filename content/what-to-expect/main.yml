eyebrow: "What to Expect"
headline: "More than a workout."
intro: "Every Signature class moves through a six-block flow — designed to strengthen the full body while leaving space to reconnect with breath, focus, and the people next to you."
blocks:
  - name: "Center"
    description: "Pelvic-floor and deep-core activation. The foundation of every Flowformer movement."
  - name: "Lower"
    description: "Glutes, hamstrings, quads. Springs loaded heavy. Time under tension."
  - name: "Obliques"
    description: "Side body, rotation, oblique-led standing work. Built into every flow."
  - name: "Upper"
    description: "Arms, chest, back. Push-pull patterns at the cables. Strength + endurance."
  - name: "Final Core"
    description: "All the deep-core work you saved for the end. The hardest, most intentional block."
  - name: "Stretch"
    description: "Three to five minutes of breath-led decompression to close the practice."
community_headline: "The class doesn't end at the door."
community_body: "We're building a studio where you'd want to grab coffee with the person next to you after class. The kind of place where people learn each other's names. flowhouse is a movement studio first, and a Reho community second — but both are intentional."
faq:
  - question: "What's the difference between Signature and Barre 45?"
    answer: "Signature is a 50-minute reformer pilates class, capped at 10 spots, built around breath-led strength and stability. Barre 45 is a 45-minute high-energy barre class, capped at 25 spots, designed to sculpt and elevate the heart rate. Different rooms in the same studio."
  - question: "What's the difference between Foundation and Signature?"
    answer: "Foundation is our slower, more cued-up reformer class — same machine, more time spent on the details. Best for first-timers, returning movers, or anyone wanting to feel every part of the practice."
  - question: "What is Yin?"
    answer: "A slow, breath-led stretch and recovery class added to our schedule for the days you need it. Coming with our full schedule release."
  - question: "I've never done reformer pilates. Where do I start?"
    answer: "Foundation is the answer. Two or three Foundation classes will give you everything you need to feel confident jumping into Signature."
