section_eyebrow: the modalities
section_headline_html: Reformer. Barre. <span class="serif-italic">Equally essential.</span>
section_intro: An elevated movement studio blending reformer pilates, barre, and intentional strength-based movement — designed to support the body long-term through posture, alignment, mobility, core strength, and mind-body connection.
classes:
  - name: Signature
    image: /images/uploads/f2cc221b-3df1-4763-a7b2-eab6ef0e925c.png
    alt: A practitioner mid-flow on the Flowformer
    tag: 50 min · intermediate
    bio: Our signature reformer class blends modern strength-based movement with foundational principles inspired by Joseph Pilates. Through intentional movement, clients build deep core strength, pelvic-floor support, stability, endurance, and full-body control.
    note: While still accessible to many clients, the pacing and sequencing lean slightly intermediate/advanced and are best suited for those with prior reformer experience.
    meta_left: Reformer
    meta_right: Time under tension
  - name: Foundation
    image: /images/uploads/628d32ea-d737-403d-ab84-e2371a23f949.png
    alt: Three practitioners on reformers in a foundation-style class
    tag: 55 min · all levels
    bio: The perfect introduction to both the reformer and the Flowhouse Method. This slower-paced class focuses on foundational pilates principles, alignment, breath, control, and safely learning the reformer.
    note: Designed to help clients build confidence, body awareness, and strong movement foundations. Suitable for all levels.
    meta_left: Reformer
    meta_right: All levels
  - name: Barre 45
    image: /images/uploads/4fb82272-1099-4124-b671-db9be329cb9a.png
    alt: Detail of a hand resting on the brass barre
    tag: 45 min · all levels
    bio: A modern barre class rooted in alignment, muscular endurance, posture, and low-impact strength training. Expect intentional movement, sculpt-based sequencing, deep core activation, and full-body burn designed to strengthen and support the body without high-impact stress.
    note: ''
    meta_left: Barre
    meta_right: Continuous movement
footer_note: Yin restorative reformer recovery, and  introductory classes round out the full menu — launching with the studio.
