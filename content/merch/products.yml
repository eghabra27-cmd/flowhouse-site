#   • An "Add to Cart" button (post-launch — once checkout_url is pasted in)
#
# To go live with a product:
#   1. Create the product in your Squarespace store
#   2. Copy the product URL from Squarespace (looks like https://flowhouse-store.squarespace.com/shop/p/the-studio-wrap-taupe)
#    3. Paste it into checkout_url below
#   4. Hit Publish — the button changes automatically
#
# To make a product disappear from the site, set hidden: true

