<!-- Mariana Tek Web Integrations loader (tenant: flowhouse) -->
<script>
  (function () {
    var TENANT_NAME = 'flowhouse';

    var d = document;
    var sA = ['polyfills', 'js'];

    for (var i = 0; i < sA.length; i++) {
      var s = d.createElement('script');
      s.src = 'https://' + TENANT_NAME + '.marianaiframes.com/' + sA[i];
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    }
  })();
</script>
<noscript>
  Please enable JavaScript to view the
  <a href="https://marianatek.com/?ref_noscript" rel="nofollow">
    Web Integrations by Mariana Tek.
  </a>
</noscript>

<!-- Pre-launch placeholder: shows a polished on-brand message ONLY while a
     container is still showing our own loading state and Mariana Tek has not
     touched it. Once the MT tenant is live, MT renders its own UI (schedule,
     empty-state, login, buy, etc.) and we must NEVER overwrite it — including
     MT's own "no classes scheduled" empty state.

     Opt-out: add data-mariana-no-fallback to a container (or data-fh-no-fallback
     on <body>) to permanently disable the placeholder for that container/page. -->
<script>
  (function () {
    // Hard opt-out at the page level (used on the Schedule page).
    if (document.body && document.body.hasAttribute('data-fh-no-fallback')) return;

    function mtHasRendered(container) {
      // Mariana Tek is considered "in control" the moment it injects ANY of its
      // own DOM into the container. This covers the live schedule, the buy page,
      // the account/login UI, AND the legitimate "no classes scheduled" empty
      // state — all of which we must leave alone.
      if (!container) return false;
      // 1) Any MT-authored element (classes/attributes are namespaced with "mariana").
      if (container.querySelector(
            'iframe,[class*="mariana"],[class*="Mariana"],[id*="mariana"],[data-mariana-app],[class*="mt-"]:not(.mt-fallback)'
          )) return true;
      // 2) Any real child element other than our own loading/fallback scaffold.
      var kids = container.children;
      for (var i = 0; i < kids.length; i++) {
        var el = kids[i];
        if (el.classList && (el.classList.contains('mt-fallback'))) continue;
        // our initial markup is a single .mt-fallback wrapper; anything else = MT.
        if (el.querySelector && el.querySelector('.mt-loading')) continue;
        return true;
      }
      return false;
    }

    function applyPlaceholder() {
      var containers = document.querySelectorAll('[data-mariana-integrations]');
      containers.forEach(function (c) {
        if (c.getAttribute('data-fh-fallback') === 'done') return;
        // Per-container opt-out.
        if (c.hasAttribute('data-mariana-no-fallback')) return;
        // If MT has rendered anything (incl. its empty state), never overwrite.
        if (mtHasRendered(c)) return;
        c.setAttribute('data-fh-fallback', 'done');
        var path = c.getAttribute('data-mariana-integrations') || '';
        var heading = 'Booking opens soon.';
        var body = 'Our live class schedule is on its way. Join the Founding Circle and you\u2019ll be first to book when classes open.';
        if (path.indexOf('account') > -1) {
          heading = 'Accounts open soon.';
          body = 'Member accounts go live with our class schedule. Join the Founding Circle for first access.';
        } else if (path.indexOf('membership') > -1 || path.indexOf('buy') > -1) {
          heading = 'Memberships open soon.';
          body = 'Founding-member pricing and packages are on their way. Join the Founding Circle to lock in first access.';
        }
        c.innerHTML =
          '<div class="mt-fallback">' +
            '<span class="eyebrow">opening summer 2026</span>' +
            '<h3 class="h4" style="margin:0.4rem 0;">' + heading + '</h3>' +
            '<p class="text-sm" style="max-width:46ch;">' + body + '</p>' +
            '<div style="display:flex;gap:0.6rem;flex-wrap:wrap;justify-content:center;margin-top:0.5rem;">' +
              '<a href="index.html#waitlist" class="btn btn--primary btn--sm">Join the Founding Circle</a>' +
              '<a href="https://flowhouse.marianatek.com" target="_blank" rel="noopener" class="btn btn--ghost btn--sm">Open booking</a>' +
            '</div>' +
          '</div>';
      });
    }

    // Check once after MT has had time to load. We DO NOT re-run on a second
    // timer, so we can never clobber a widget that rendered late or that swaps
    // its internal view (e.g. schedule -> empty state) after first paint.
    setTimeout(applyPlaceholder, 6000);
  })();
</script>
